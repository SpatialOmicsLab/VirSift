name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  black:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install formatter
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Check formatting
        run: black --check .

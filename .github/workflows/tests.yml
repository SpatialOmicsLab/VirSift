name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests when present
        shell: bash
        run: |
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \)             -not -path "./.venv/*" -not -path "./venv/*" | grep -q .; then
            pytest
          else
            echo "No pytest test files were detected; skipping test execution."
          fi
